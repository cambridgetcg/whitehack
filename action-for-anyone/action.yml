name: 'whitehack — honesty check'
description: 'Scan your code for where it lies about its own state'
inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
runs:
  using: 'composite'
  steps:
    - name: scan
      shell: bash
      env:
        WHITEHACK_ACTION_PATH: ${{ github.action_path }}
        WHITEHACK_INPUT_PATH: ${{ inputs.path }}
      run: |
        node "$WHITEHACK_ACTION_PATH/../bin/whitehack.js" scan \
          --json --redacted --require-files -- "$WHITEHACK_INPUT_PATH"
