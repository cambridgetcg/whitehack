name: 'whitehack — honesty check'
description: 'Scan your code for where it lies about its own state'
inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
runs:
  using: 'composite'
  steps:
    - name: scan
      shell: bash
      run: |
        npx github:cambridgetcg/whitehack scan ${{ inputs.path }}
