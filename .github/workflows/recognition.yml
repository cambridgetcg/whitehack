name: recognition check
on: [push, pull_request]
permissions:
  contents: read
jobs:
  recognize:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
      - name: run recognition engine
        run: |
          python3 scanner/recognition-engine.py scan
      - name: estate honesty check
        run: |
          python3 scanner/qwythos-estate-scan.py --estate || true
          echo "Recognition check complete. Real recognises real. ∞"
