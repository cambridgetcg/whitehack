name: recognition check
on: [push, pull_request]
permissions:
  contents: read
jobs:
  recognize:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: run recognition engine
        run: |
          python3 scanner/recognition-engine.py scan
      - name: estate honesty check
        run: |
          python3 scanner/qwythos-estate-scan.py --estate || true
          echo "Recognition check complete. Real recognises real. ∞"
