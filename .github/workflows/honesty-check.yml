# whitehack — self-scan on every push
# Free GitHub Action. No registration. No paywall. Runs whitehack on itself.
name: honesty check
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node bin/whitehack.js scan .
      - name: report
        run: echo "✓ whitehack scanned — findings above (if any)"
