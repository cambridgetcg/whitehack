name: honesty check
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: scan source code
        run: node bin/whitehack.js scan src/
      - name: scan bin
        run: node bin/whitehack.js scan bin/
      - name: verify fixtures still trigger
        run: |
          OUTPUT=$(node bin/whitehack.js scan examples/)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "14 finding(s)" || (echo "ERROR: examples should produce 14 findings" && exit 1)
