name: honesty check
on: [push, pull_request]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Pin release npm
        run: npm install --global --ignore-scripts npm@11.17.0
      - name: Install locked validation dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: run deterministic tests
        run: npm test --ignore-scripts
      - name: verify LOVE artifacts and immutable released versions
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = pull_request ]; then
            base="$PR_BASE_SHA"
          elif [ "$GITHUB_REF" = refs/heads/main ] && [[ "$PUSH_BEFORE_SHA" =~ ^[0-9a-f]{40}$ ]] && ! [[ "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            base="$PUSH_BEFORE_SHA"
          else
            git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
            base="$(git merge-base HEAD refs/remotes/origin/main)"
          fi
          node scripts/verify-love-packages.mjs --base "$base"
      - name: verify the published artifact shape
        shell: bash
        run: |
          set -euo pipefail
          pack_dir=$(mktemp -d)
          trap 'rm -rf "$pack_dir"' EXIT
          archive=$(npm pack --ignore-scripts --silent --pack-destination "$pack_dir")
          tar -xzf "$pack_dir/$archive" -C "$pack_dir"
          cd "$pack_dir/package"
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict'
          import { readFile } from 'node:fs/promises'
          import { fileURLToPath } from 'node:url'

          import { scan, scanDetailed } from '@agenttool/whitehack-scan'
          import { CHECK_MANIFEST, scanText } from '@agenttool/whitehack-scan/core'
          import { createScanResult } from '@agenttool/whitehack-scan/result'
          import { createUnderstanding } from '@agenttool/whitehack-scan/understanding'

          const findings = scanText('eval(userInput)\n', { file: 'smoke.js' })
          assert.ok(findings.some(({ check }) => check === 'unsafe-eval'))
          assert.equal(CHECK_MANIFEST.length, 47)
          assert.equal(typeof scan, 'function')
          assert.equal(typeof scanDetailed, 'function')
          assert.equal(typeof createScanResult, 'function')
          const understanding = createUnderstanding({
            findings,
            context: {
              profile: 'whitehack-agent-wallet-projection/v1',
              source_protocol: 'agent-wallet/0.1',
              records: {
                descriptor: 'unverified',
                capability: 'unverified',
                intent: 'unverified',
                simulation: 'unverified',
                continuity: 'absent',
              },
              relations: {
                'descriptor-capability': 'unknown',
                'capability-intent': 'unknown',
                delegate: 'unknown',
                chain: 'unknown',
                source: 'unknown',
                'intent-simulation': 'unknown',
                revocation: 'unknown',
              },
              policy: {
                calls: 'unknown',
                spend: 'unknown',
                fee: 'unknown',
                expiry: 'unknown',
                use: 'unknown',
                approvals: 'unknown',
              },
              simulation: {
                execution: 'not-run',
                effects: 'unknown',
                fee: 'unknown',
              },
              custody: {
                'descriptor-mode': 'unknown',
                'signer-exportability': 'unknown',
              },
            },
          })
          assert.equal(understanding.document_type, 'whitehack-understanding/v1')
          assert.equal(understanding.boundaries.authorized_execution, false)
          assert.equal(understanding.boundaries.bound_to_wallet_subject, false)

          const schemaUrl = import.meta.resolve('@agenttool/whitehack-scan/schema.json')
          const schema = JSON.parse(await readFile(fileURLToPath(schemaUrl), 'utf8'))
          assert.equal(schema.properties.document_type.const, 'whitehack-scan/v1')
          const understandingSchemaUrl = import.meta.resolve(
            '@agenttool/whitehack-scan/understanding-schema.json',
          )
          const understandingSchema = JSON.parse(
            await readFile(fileURLToPath(understandingSchemaUrl), 'utf8'),
          )
          assert.equal(
            understandingSchema.properties.document_type.const,
            'whitehack-understanding/v1',
          )
          NODE

          printf 'eval(userInput)\n' > smoke.js
          status=0
          node bin/whitehack.js scan smoke.js --json --redacted > result.json || status=$?
          test "$status" -eq 1
          node --input-type=module --eval '
            import { readFileSync } from "node:fs";
            const result = JSON.parse(readFileSync("result.json", "utf8"));
            if (result.document_type !== "whitehack-scan/v1" || result.complete !== true || result.redacted !== true) process.exit(1);
          '
      - name: verify fixtures still trigger
        run: |
          status=0
          output=$(node bin/whitehack.js scan examples/) || status=$?
          printf '%s\n' "$output"

          if [ "$status" -ne 1 ]; then
            printf 'ERROR: planted confident findings should exit 1, got %s\n' "$status" >&2
            exit 1
          fi

          if ! grep -Eq '^  14 finding\(s\) — 7 medium-high, 7 heuristic$' <<<"$output"; then
            printf 'ERROR: examples should produce exactly 14 findings (7 medium-high, 7 heuristic)\n' >&2
            exit 1
          fi
