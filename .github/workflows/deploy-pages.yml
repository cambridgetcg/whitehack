name: deploy pages
on:
  push:
    branches: [main]
permissions:
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: build site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp playground.html _site/playground.html
          cp learn.html _site/learn.html
          cp LEARN.md _site/LEARN.md
          cp LOOP.md _site/LOOP.md
          cp CONTRIBUTING.md _site/CONTRIBUTING.md
          cp SHARE.md _site/SHARE.md
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
