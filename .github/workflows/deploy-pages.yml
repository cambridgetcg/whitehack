name: deploy pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Pin release npm
        run: npm install --global --ignore-scripts npm@11.17.0
      - name: verify exact immutable LOVE artifacts
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          node scripts/verify-love-packages.mjs --base "$BASE_SHA"
      - name: build site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html _site/index.html
          cp playground.html _site/playground.html
          cp learn.html _site/learn.html
          cp LEARN.md _site/LEARN.md
          cp LOOP.md _site/LOOP.md
          cp CONTRIBUTING.md _site/CONTRIBUTING.md
          cp SHARE.md _site/SHARE.md
          test -d packages/v1
          cp -R packages _site/packages
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
