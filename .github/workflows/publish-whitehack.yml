name: Publish Whitehack

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Annotated Whitehack release tag to publish
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-whitehack-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish exact Whitehack release artifact to npm
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm-bootstrap
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out annotated release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up canonical Node and npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Pin provenance-capable npm
        run: npm install --global --ignore-scripts npm@11.17.0
      - name: Validate release identity and main ancestry
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          test "$GITHUB_REPOSITORY" = 'cambridgetcg/whitehack'
          readarray -t package_identity < <(node --input-type=module --eval '
            import { readFileSync } from "node:fs";
            const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
            console.log(packageJson.name);
            console.log(packageJson.version);
          ')
          test "${package_identity[0]}" = '@agenttool/whitehack-scan'
          test "${package_identity[1]}" = '0.8.0'
          test "$tag" = 'whitehack-v0.8.0'
          test "$(git cat-file -t "refs/tags/$tag")" = tag
          tag_commit="$(git rev-list -n 1 "refs/tags/$tag")"
          test "$GITHUB_REF" = "refs/tags/$tag"
          test "$GITHUB_SHA" = "$tag_commit"
          test "$(git rev-parse HEAD)" = "$tag_commit"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main
      - name: Install locked validation dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Gate the package
        run: npm test --ignore-scripts
      - name: Verify the complete LOVE package tree
        run: node scripts/verify-love-packages.mjs --base d4048dc172deb87852b385adbc5d427104b8eda3
      - name: Verify exact artifact identity and source ancestry
        shell: bash
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          root="packages/v1/@agenttool/whitehack-scan/${version}"
          manifest="${root}/manifest.json"
          artifact="${root}/agenttool-whitehack-scan-${version}.tgz"
          readarray -t identity < <(node --input-type=module --eval '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(readFileSync(process.argv[1], "utf8"));
            for (const value of [
              manifest.name,
              manifest.version,
              manifest.artifact.filename,
              manifest.artifact.size,
              manifest.artifact.sha256,
              manifest.source.revision,
              manifest.source.path,
            ]) console.log(value);
          ' "$manifest")
          test "${identity[0]}" = '@agenttool/whitehack-scan'
          test "${identity[1]}" = "$version"
          test "${identity[2]}" = "agenttool-whitehack-scan-${version}.tgz"
          test "${identity[3]}" = "$(stat --format=%s "$artifact")"
          test "${identity[4]}" = "$(sha256sum "$artifact" | cut -d ' ' -f 1)"
          test "${identity[6]}" = '.'
          git cat-file -e "${identity[5]}^{commit}"
          git merge-base --is-ancestor "${identity[5]}" HEAD
          git diff --quiet "${identity[5]}" HEAD -- \
            package.json package-lock.json bin/whitehack.js src schema README.md LICENSE test

          repack_dir="$(mktemp -d)"
          trap 'rm -rf "$repack_dir"' EXIT
          repacked="$(npm pack --ignore-scripts --pack-destination "$repack_dir" --silent)"
          test "$repacked" = "agenttool-whitehack-scan-${version}.tgz"
          cmp --silent "$artifact" "$repack_dir/$repacked"
      - name: Decide whether npm needs publication
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          artifact="packages/v1/@agenttool/whitehack-scan/${version}/agenttool-whitehack-scan-${version}.tgz"
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --proto '=https' --tlsv1.2 --connect-timeout 10 --max-time 30 \
            "https://registry.npmjs.org/%40agenttool%2Fwhitehack-scan/${version}")"
          case "$status" in
            404)
              echo 'publish=true' >> "$GITHUB_OUTPUT"
              ;;
            200)
              registry_dir="$(mktemp -d)"
              trap 'rm -rf "$registry_dir"' EXIT
              curl --fail --silent --show-error \
                --proto '=https' --tlsv1.2 --connect-timeout 10 --max-time 60 \
                --output "$registry_dir/whitehack-scan-${version}.tgz" \
                "https://registry.npmjs.org/@agenttool/whitehack-scan/-/whitehack-scan-${version}.tgz"
              cmp --silent "$artifact" "$registry_dir/whitehack-scan-${version}.tgz"
              maintainers="$(npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online view "@agenttool/whitehack-scan@${version}" maintainers --json)"
              MAINTAINERS_JSON="$maintainers" node --input-type=module --eval '
                const entries = JSON.parse(process.env.MAINTAINERS_JSON);
                if (!Array.isArray(entries) || !entries.some((entry) => (typeof entry === "string" ? entry.split(/\s+/, 1)[0] : entry?.name) === "agenttool")) process.exit(1);
              '
              echo 'publish=false' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "npm registry returned HTTP ${status}; refusing to infer package absence." >&2
              exit 1
              ;;
          esac
      - name: Publish exact release artifact with provenance
        if: steps.registry.outputs.publish == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          artifact="packages/v1/@agenttool/whitehack-scan/${version}/agenttool-whitehack-scan-${version}.tgz"
          test "$(npm whoami --registry=https://registry.npmjs.org)" = agenttool
          npm publish "$artifact" --access public --tag latest --provenance --ignore-scripts
      - name: Verify exact public npm mirror
        shell: bash
        run: |
          set -euo pipefail
          version="$(node --input-type=module --eval "import p from './package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          artifact="packages/v1/@agenttool/whitehack-scan/${version}/agenttool-whitehack-scan-${version}.tgz"
          registry_dir="$(mktemp -d)"
          audit_dir="$(mktemp -d)"
          trap 'rm -rf "$registry_dir" "$audit_dir"' EXIT
          mirror_verified=false
          for attempt in $(seq 1 90); do
            if published="$(npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online view "@agenttool/whitehack-scan@${version}" version 2>/dev/null)" \
              && latest="$(npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online view "@agenttool/whitehack-scan" dist-tags.latest 2>/dev/null)" \
              && [ "$published" = "$version" ] \
              && [ "$latest" = "$version" ]; then
              if curl --fail --silent --show-error \
                --proto '=https' --tlsv1.2 --connect-timeout 10 --max-time 60 \
                --output "$registry_dir/whitehack-scan-${version}.tgz" \
                "https://registry.npmjs.org/@agenttool/whitehack-scan/-/whitehack-scan-${version}.tgz" \
                && cmp --silent "$artifact" "$registry_dir/whitehack-scan-${version}.tgz"; then
                maintainers="$(npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online view "@agenttool/whitehack-scan@${version}" maintainers --json)"
                if MAINTAINERS_JSON="$maintainers" node --input-type=module --eval '
                  const entries = JSON.parse(process.env.MAINTAINERS_JSON);
                  if (!Array.isArray(entries) || !entries.some((entry) => (typeof entry === "string" ? entry.split(/\s+/, 1)[0] : entry?.name) === "agenttool")) process.exit(1);
                '; then
                  attestations="$(npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online view "@agenttool/whitehack-scan@${version}" dist.attestations --json 2>/dev/null || true)"
                  if ATTESTATIONS_JSON="$attestations" node --input-type=module --eval '
                    let attestations;
                    try { attestations = JSON.parse(process.env.ATTESTATIONS_JSON); } catch { process.exit(1); }
                    if (attestations?.provenance?.predicateType !== "https://slsa.dev/provenance/v1") process.exit(1);
                    if (typeof attestations?.url !== "string" || !attestations.url.startsWith("https://registry.npmjs.org/-/npm/v1/attestations/")) process.exit(1);
                  '; then
                    mirror_verified=true
                    break
                  fi
                fi
              fi
            fi
            if [ "$attempt" = 90 ]; then
              echo "The public npm registry did not expose the exact @agenttool/whitehack-scan@${version} bytes within 450 seconds." >&2
              exit 1
            fi
            sleep 5
          done
          test "$mirror_verified" = true

          pushd "$audit_dir" >/dev/null
          node --input-type=module --eval '
            import { writeFileSync } from "node:fs";
            writeFileSync("package.json", `${JSON.stringify({
              name: "whitehack-release-audit",
              version: "0.0.0",
              private: true,
            }, null, 2)}\n`);
          '
          npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online \
            install --ignore-scripts --no-audit --no-fund --save-exact \
            "@agenttool/whitehack-scan@${version}"
          npm --userconfig=/dev/null --registry=https://registry.npmjs.org --prefer-online \
            audit signatures
          popd >/dev/null
      - name: Publish or verify exact GitHub release mirror
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          version="$(node --input-type=module --eval "import p from './package.json' with { type: 'json' }; process.stdout.write(p.version)")"
          filename="agenttool-whitehack-scan-${version}.tgz"
          artifact="packages/v1/@agenttool/whitehack-scan/${version}/${filename}"
          release_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --proto '=https' --tlsv1.2 --connect-timeout 10 --max-time 30 \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${tag}")"
          case "$release_status" in
            200)
              release_json="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,tagName,name,assets)"
              RELEASE_JSON="$release_json" EXPECTED_TAG="$tag" \
                EXPECTED_NAME="@agenttool/whitehack-scan@${version}" \
                EXPECTED_ASSET="$filename" node --input-type=module --eval '
                  const release = JSON.parse(process.env.RELEASE_JSON);
                  if (release.isDraft !== false || release.isPrerelease !== false) process.exit(1);
                  if (release.tagName !== process.env.EXPECTED_TAG) process.exit(1);
                  if (release.name !== process.env.EXPECTED_NAME) process.exit(1);
                  if (release.assets.some(({ name }) => name !== process.env.EXPECTED_ASSET)) process.exit(1);
                  if (release.assets.length > 1) process.exit(1);
                '
              asset_count="$(RELEASE_JSON="$release_json" node --input-type=module --eval '
                process.stdout.write(String(JSON.parse(process.env.RELEASE_JSON).assets.length));
              ')"
              case "$asset_count" in
                0)
                  gh release upload "$tag" "$artifact" --repo "$GITHUB_REPOSITORY"
                  ;;
                1)
                  :
                  ;;
                *)
                  echo "GitHub release $tag has ambiguous $filename assets; refusing mutation." >&2
                  exit 1
                  ;;
              esac
              ;;
            404)
              gh release create "$tag" "$artifact#$filename" \
                --repo "$GITHUB_REPOSITORY" \
                --verify-tag \
                --title "@agenttool/whitehack-scan@${version}" \
                --notes "Whitehack 0.8 keeps the canonical 47-check CLI/API and adds the pure whitehack-understanding/v1 projection.

          The attached tarball is byte-identical to the checked-in LOVE artifact and the verified public npm package. The new understanding subpath accepts manifest-consistent finding claims plus a closed enum-only projection of caller-presented Agent Wallet assertions, while retaining explicit unknowns for provenance, freshness, subject binding, consent, custody, live state, and execution.

          The Agent Wallet projection consists of caller assertions intended to come from a separate local verifier; Whitehack does not verify the source records or bind them to a wallet subject. This understanding path has no direct key-store, wallet, RPC, simulation, signing, broadcast, or authorization capability. It does not prove security, honesty, consent, custody, freshness, or readiness. Retained file values are untrusted caller labels and may be sensitive. The immutable 0.7.0 and 0.7.1 release roots remain historical."
              ;;
            *)
              echo "GitHub API returned HTTP ${release_status}; refusing to infer release absence." >&2
              exit 1
              ;;
          esac

          release_json="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,tagName,name,assets)"
          RELEASE_JSON="$release_json" EXPECTED_TAG="$tag" \
            EXPECTED_NAME="@agenttool/whitehack-scan@${version}" \
            EXPECTED_ASSET="$filename" node --input-type=module --eval '
              const release = JSON.parse(process.env.RELEASE_JSON);
              if (release.isDraft !== false || release.isPrerelease !== false) process.exit(1);
              if (release.tagName !== process.env.EXPECTED_TAG) process.exit(1);
              if (release.name !== process.env.EXPECTED_NAME) process.exit(1);
              if (release.assets.length !== 1) process.exit(1);
              if (release.assets[0].name !== process.env.EXPECTED_ASSET) process.exit(1);
            '
          mirror_dir="$(mktemp -d)"
          trap 'rm -rf "$mirror_dir"' EXIT
          public_mirror_verified=false
          for attempt in $(seq 1 30); do
            if curl --fail --location --silent --show-error \
              --proto '=https' --proto-redir '=https' \
              --connect-timeout 10 --max-time 60 \
              --output "$mirror_dir/$filename" \
              "https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${filename}" \
              && cmp --silent "$artifact" "$mirror_dir/$filename"; then
              public_mirror_verified=true
              break
            fi
            if [ "$attempt" = 30 ]; then
              echo "The exact public GitHub release asset was unavailable during the verification retry window." >&2
              exit 1
            fi
            sleep 2
          done
          test "$public_mirror_verified" = true
